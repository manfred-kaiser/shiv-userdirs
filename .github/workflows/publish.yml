name: publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: build
        run: |
          python -m pip install build
          python -m build

      - name: publish to pypi
        uses: pypa/gh-action-pypi-publish@release/v1
